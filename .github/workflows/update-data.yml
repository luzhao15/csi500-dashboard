name: Update CSI500 Data

on:
  schedule:
    # 每天 22:00 北京时间 (UTC+8 = 14:00 UTC)
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run signal script
        run: python csi500_signal.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csi500_data.json csi500_chart.json
          git diff --cached --quiet || git commit -m "auto: update data $(date +%Y-%m-%d)"
          git push
