name: Update CSI500 Data

on:
  schedule:
    # 每天15:30北京时间收盘后更新 (UTC 07:30 = 北京15:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run signal script
        run: python csi500_signal.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add csi500_data.json csi500_chart.json
          git diff --cached --quiet || git commit -m "auto: update data $(date +%Y-%m-%d)"
          git push
